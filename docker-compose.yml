services:
  postgres:
    image: postgres:17

    container_name: slumberspot-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: slumberspot_db

    ports:
      - "5433:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile

    container_name: slumberspot-backend

    restart: always

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/slumberspot_db
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}

    ports:
      - "3000:3000"
  
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile 
      args: 
        NEXT_PUBLIC_API_URL: http://13.60.105.116:3000

    container_name: slumberspot-frontend

    restart: always

    depends_on:
        - backend

    ports:
        - 3001:3000

volumes:
  postgres-data:

